baseURL = "https://asingamaneni.github.io/omniplug/"
title = "omniplug"
theme = "hugo-book"
enableGitInfo = false
refLinksErrorLevel = "warning"

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3

[params]
  BookTheme = "auto"
  BookToC = true
  BookSection = "docs"
