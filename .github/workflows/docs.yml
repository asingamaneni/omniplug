name: Docs

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "internal/cli/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Deploy to GitHub Pages via the Actions artifact flow.
# Repo Settings → Pages → Source: "GitHub Actions".
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: "0.163.3"
    steps:
      - uses: actions/checkout@v7
      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages (Actions source) on first run so the workflow
          # doesn't hard-fail before the repo setting is flipped manually.
          enablement: true
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Install Hugo (extended)
        run: |
          curl -fsSL "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin hugo
      - name: Generate CLI reference
        run: go run ./cmd/omniplug gen-docs --dir site/content/docs/reference
      - name: Build site
        run: hugo --gc --minify --source site --baseURL "${{ steps.pages.outputs.base_url }}/"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
